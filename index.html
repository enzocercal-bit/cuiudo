<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site com Menu no Topo</title>
    <style>
        /* Remove margens padrão do navegador */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            padding-top: 60px; /* Evita que o menu cubra o conteúdo */
        }

        /* Estilo do menu no topo */
        .menu-topo {
            background-color: #333;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        /* Lista de links do menu */
        .menu-topo ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Centraliza os itens */
        }

        /* Itens do menu */
        .menu-topo li {
            padding: 15px 20px;
        }

        /* Links do menu */
        .menu-topo a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            transition: color 0.3s;
        }

        /* Efeito ao passar o mouse */
        .menu-topo a:hover {
            color: #4CAF50;
        }

        /* Conteúdo da página */
        .conteudo {
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Menu de Navegação -->
    <nav class="menu-topo">
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="sobre.html">Sobre Nós</a></li>
            <li><a href="servicos.html">Serviços</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="conteudo">
        <h1>Bem-vindo à Página Inicial</h1>
        <p>Este é o conteúdo principal da sua página com o menu fixado no topo.</p>
    </main>

</body>
</html>
<!-- PATO POLÍTICO (ELEMENTO VISUAL) -->
<div id="pato-politico" class="container-pato">
    <!-- Balão de Fala -->
    <div id="balao-pato" class="balao-fala">Vote em mim!</div>
    
    <!-- Corpo do Pato feito em SVG -->
    <svg viewBox="0 0 100 100" width="80" height="80">
        <!-- Corpo (Amarelo) -->
        <circle cx="50" cy="60" r="25" fill="#FFD700" />
        <!-- Cabeça (Amarelo) -->
        <circle cx="50" cy="30" r="18" fill="#FFD700" />
        <!-- Olho (Preto) -->
        <circle cx="55" cy="26" r="3" fill="#000" />
        <!-- Bico (Laranja) -->
        <polygon points="58,28 73,32 58,38" fill="#FF8C00" />
        <!-- Terno Presidencial (Preto) -->
        <path d="M32,73 Q50,55 68,73 L62,85 L38,85 Z" fill="#111" />
        <!-- Camisa Branca -->
        <polygon points="45,60 55,60 50,72" fill="#FFF" />
        <!-- Gravata Borboleta (Vermelha de Político) -->
        <polygon points="44,60 50,64 44,68" fill="#D32F2F" />
        <polygon points="56,60 50,64 56,68" fill="#D32F2F" />
        <circle cx="50" cy="64" r="2" fill="#D32F2F" />
    </svg>
    <div style="text-align: center; font-size: 11px; font-weight: bold; background: #000; color: #FFF; border-radius: 5px; padding: 2px;">CANDIDATO</div>
</div>

<!-- ESTILOS DO PATO -->
<style>
    .container-pato {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        cursor: pointer;
        animation: flutuar 3s ease-in-out infinite;
    }

    /* Animação para o pato ficar subindo e descendo levemente */
    @keyframes flutuar {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    /* Estilo do Balão de Fala */
    .balao-fala {
        position: absolute;
        top: -65px;
        right: 0;
        background-color: white;
        border: 2px solid #222;
        border-radius: 10px;
        padding: 8px 12px;
        font-family: Arial, sans-serif;
        font-size: 13px;
        font-weight: bold;
        white-space: nowrap;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        opacity: 1;
        transition: opacity 0.3s;
    }

    /* Setinha do balão de fala */
    .balao-fala::after {
        content: '';
        position: absolute;
        bottom: -10px;
        right: 30px;
        border-width: 10px 10px 0;
        border-style: solid;
        border-color: white transparent;
        display: block;
        width: 0;
    }
</style>

<!-- FRASES DO PATO (JAVASCRIPT) -->
<script>
    const frases = [
        "Quack! Vou proibir as segundas-feiras!",
        "Prometo lagoas limpas e milho grátis!",
        "Quack! Menos impostos sobre o alpiste!",
        "Meu adversário é um ganso corrupto!",
        "Quack! Vote 99, o candidato do povo!",
        "Chega de promessas furadas, eu dou asas ao país!"
    ];

    const balao = document.getElementById('balao-pato');
    const pato = document.getElementById('pato-politico');

    // Muda a frase toda vez que passa o mouse no pato
    pato.addEventListener('mouseenter', () => {
        const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];
        balao.innerText = fraseAleatoria;
        balao.style.opacity = '1';
    });
</script>
